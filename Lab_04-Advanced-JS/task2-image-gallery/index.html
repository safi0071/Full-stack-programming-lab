<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animated Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Animated Image Gallery</h2>

    <div class="gallery">
        <img id="galleryImage" src="https://picsum.photos/id/1015/500/300" alt="Gallery Image">
        <p id="caption">Beautiful Landscape</p>
    </div>

    <div class="buttons">
        <button onclick="prevImage()">Previous</button>
        <button onclick="nextImage()">Next</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
