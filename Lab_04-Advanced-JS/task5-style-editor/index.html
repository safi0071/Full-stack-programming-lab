<!DOCTYPE html>
<html>
<head>
    <title>Chained Style Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Chained Style Editor</h2>

<div class="controls">
    <button id="increase">Increase Font</button>
    <button id="decrease">Decrease Font</button>
    <button id="color">Change Text Color</button>
    <button id="bg">Change Background</button>
    <button id="bold">Bold</button>
    <button id="italic">Italic</button>
</div>

<p id="text">
    This is a sample text. Use buttons to apply styles.
</p>

<script src="script.js"></script>
</body>
</html>
